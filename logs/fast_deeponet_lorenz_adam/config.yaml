experiment:
  name: fast_deeponet_lorenz_adam
  seed: 42
  device: cpu
  deterministic: true
dataset:
  type: lorenz
  params:
    sigma: 10.0
    rho: 28.0
    beta: 2.667
    initial_condition:
    - 1.0
    - 1.0
    - 1.0
    trajectory_length: 200
  num_train_trajectories: 1000
  num_val_trajectories: 200
  input_horizon: 10
  output_horizon: 1
  train_val_split: 0.8
  batch_size: 64
  shuffle: true
model:
  type: deeponet
  params:
    branch_layers:
    - 64
    - 64
    trunk_layers:
    - 64
    - 64
    basis_dim: 32
    activation: tanh
    use_bias: true
optimizer:
  type: adam
  params:
    learning_rate: 0.001
    weight_decay: 0.0
training:
  num_epochs: 20
  batch_size: 64
  validation_interval: 100
  variance_interval: 200
  checkpoint_interval: 500
  early_stopping_patience: 5
  target_loss: 0.001
logging:
  log_dir: ./logs
  save_checkpoints: false
  save_final_model: true
  log_level: INFO
analysis:
  compute_spectral_radius: true
  spectral_interval: 5000
  long_horizon_steps: 50
  num_eigenvalues: 5
visualization:
  generate_plots: false
  plot_format: pdf
  dpi: 300
  output_dir: ./visualization_output
scheduler:
  type: cosine
  params:
    T_max: 5000
    eta_min: 1.0e-06
