experiment:
  name: test_deeponet_logistic_svrg
  seed: 42
  device: cpu
  deterministic: true
dataset:
  type: logistic
  params:
    r: 3.8
    initial_condition: 0.5
    trajectory_length: 50
  num_train_trajectories: 20
  num_val_trajectories: 5
  input_horizon: 5
  output_horizon: 1
  train_val_split: 0.8
  batch_size: 4
  shuffle: true
model:
  type: deeponet
  params:
    branch_layers:
    - 32
    - 32
    trunk_layers:
    - 32
    - 32
    basis_dim: 16
    activation: tanh
    use_bias: true
optimizer:
  type: svrg
  params:
    learning_rate: 0.001
    inner_loop_length: 3
    weight_decay: 0.0
training:
  num_epochs: 2
  batch_size: 4
  validation_interval: 5
  variance_interval: 10
  checkpoint_interval: 50
  early_stopping_patience: 10
  target_loss: 0.01
logging:
  log_dir: ./logs
  save_checkpoints: true
  save_final_model: true
  log_level: INFO
analysis:
  compute_spectral_radius: true
  spectral_interval: 50
  long_horizon_steps: 20
  num_eigenvalues: 3
visualization:
  generate_plots: true
  plot_format: pdf
  dpi: 300
  output_dir: ./visualization_output
scheduler:
  type: step
  params:
    step_size: 30
    gamma: 0.9
