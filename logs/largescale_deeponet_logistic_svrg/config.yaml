experiment:
  name: largescale_deeponet_logistic_svrg
  seed: 42
  device: cpu
  deterministic: true
dataset:
  type: logistic
  params:
    r: 3.8
    initial_condition: 0.5
    trajectory_length: 500
  num_train_trajectories: 2000
  num_val_trajectories: 500
  input_horizon: 10
  output_horizon: 1
  train_val_split: 0.8
  batch_size: 32
  shuffle: true
model:
  type: deeponet
  params:
    branch_layers:
    - 128
    - 128
    - 64
    trunk_layers:
    - 128
    - 128
    - 64
    basis_dim: 64
    activation: tanh
    use_bias: true
optimizer:
  type: svrg
  params:
    learning_rate: 0.01
    inner_loop_length: 50
    weight_decay: 0.0
training:
  num_epochs: 100
  batch_size: 32
  validation_interval: 100
  variance_interval: 500
  checkpoint_interval: 1000
  early_stopping_patience: 20
  target_loss: 0.0001
logging:
  log_dir: ./logs
  save_checkpoints: true
  save_final_model: true
  log_level: INFO
analysis:
  compute_spectral_radius: true
  spectral_interval: 1000
  long_horizon_steps: 100
  num_eigenvalues: 10
visualization:
  generate_plots: true
  plot_format: pdf
  dpi: 300
  output_dir: ./visualization_output
scheduler:
  type: cosine
  params:
    T_max: 10000
    eta_min: 1.0e-06
