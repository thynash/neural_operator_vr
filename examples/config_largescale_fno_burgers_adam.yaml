experiment:
  name: "largescale_fno_burgers_adam"
  seed: 42
  device: "cpu"
  deterministic: true

dataset:
  type: "burgers"
  params:
    viscosity: 0.01
    initial_condition_type: "random_fourier"
    num_modes: 8
  num_train_trajectories: 5000  # Scaled up from typical 100-500
  num_val_trajectories: 1000
  spatial_points: 256
  temporal_points: 100
  train_val_split: 0.8
  batch_size: 128  # Larger batch size
  shuffle: true

model:
  type: "fno"
  params:
    modes: 16
    width: 64
    num_layers: 4
    activation: "gelu"

optimizer:
  type: "adam"
  params:
    learning_rate: 0.001
    betas: [0.9, 0.999]
    weight_decay: 0.0001

scheduler:
  type: "cosine"
  params:
    T_max: 10000
    eta_min: 1.0e-06

training:
  num_epochs: 50  # Longer training
  batch_size: 128
  validation_interval: 100
  variance_interval: 500
  checkpoint_interval: 1000
  early_stopping_patience: 10
  target_loss: 0.0001

logging:
  log_dir: "./logs"
  save_checkpoints: true
  save_final_model: true
  log_level: "INFO"

analysis:
  compute_spectral_radius: true
  spectral_interval: 1000
  long_horizon_steps: 100
  num_eigenvalues: 10

visualization:
  generate_plots: true
  plot_format: "pdf"
  dpi: 300
  output_dir: "./visualization_output"
