experiment:
  name: "deeponet_lorenz_svrg"
  seed: 42
  device: "cuda"
  deterministic: true

dataset:
  type: "lorenz"
  params:
    sigma: 10.0
    rho: 28.0
    beta: 2.667
    dt: 0.01
    trajectory_length: 1000
  num_train_trajectories: 1000
  num_val_trajectories: 200
  input_horizon: 10
  output_horizon: 1
  train_val_split: 0.8
  batch_size: 32
  shuffle: true

model:
  type: "deeponet"
  params:
    branch_layers: [128, 128, 64]
    trunk_layers: [128, 128, 64]
    basis_dim: 64
    activation: "relu"
    use_bias: true

optimizer:
  type: "svrg"
  params:
    learning_rate: 0.001
    inner_loop_length: 100
    weight_decay: 0.0

scheduler:
  type: "step"
  params:
    step_size: 1000
    gamma: 0.9

training:
  num_epochs: 100
  batch_size: 32
  validation_interval: 100
  variance_interval: 500
  checkpoint_interval: 1000
  early_stopping_patience: 20
  target_loss: 0.0001

logging:
  log_dir: "./logs"
  save_checkpoints: true
  save_final_model: true
  log_level: "INFO"

analysis:
  compute_spectral_radius: true
  spectral_interval: 1000
  long_horizon_steps: 100
  num_eigenvalues: 10

visualization:
  generate_plots: true
  plot_format: "pdf"
  dpi: 300
  output_dir: "./visualization_output"
